<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geo-Camo Defense System — Iron Dome Simulation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --surface:rgba(12,18,12,.88);--surface2:rgba(18,28,18,.92);
  --text:#c8e6c9;--text2:#81c784;--text3:#4a6a4a;
  --border:rgba(0,255,65,.12);--border2:rgba(0,255,65,.22);
  --radar-green:#00ff41;--radar-dim:rgba(0,255,65,.08);
  --alert-red:#ff4444;--drone-blue:#00e5ff;
  --radius:8px;--radius-lg:20px;
  --mono:'Roboto Mono',monospace;--sans:'Roboto',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--sans);background:#080c08;color:var(--text)}

/* ═══ TOP BAR ═══ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  display:flex;align-items:center;gap:16px;padding:0 20px;
  background:var(--surface2);border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
}
.topbar-logo{font:700 14px var(--mono);color:var(--radar-green);letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.topbar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--radar-green);animation:pulse-dot 2s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 4px var(--radar-green)}50%{opacity:.4;box-shadow:0 0 12px var(--radar-green)}}
.topbar-loc{font:400 12px var(--mono);color:var(--text3);margin-left:8px}
.topbar-tabs{display:flex;gap:2px;margin-left:auto;background:rgba(0,0,0,.3);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}
.tab-btn{
  padding:6px 18px;border:none;border-radius:6px;font:500 12px var(--sans);
  color:var(--text3);background:transparent;cursor:pointer;transition:all .2s;
}
.tab-btn.active{background:rgba(0,255,65,.12);color:var(--radar-green)}
.tab-btn:hover:not(.active){color:var(--text2)}

/* ═══ SIM VIEW ═══ */
.sim-view{
  position:fixed;inset:52px 0 44px 0;
  background:#0a1208 center/cover no-repeat;
  overflow:hidden;
}
.sim-view.drawing-mode{cursor:crosshair}

/* ═══ RADAR ZONES ═══ */
.radar-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:10}
.radar-zone{animation:radar-pulse 3s ease-in-out infinite}
@keyframes radar-pulse{0%,100%{opacity:.7}50%{opacity:1}}

/* ═══ DRONE ═══ */
.drone{
  position:absolute;z-index:20;width:28px;height:28px;
  transform:translate(-50%,-50%);transition:opacity .1s;
}
.drone.dead{opacity:0;pointer-events:none}
.drone-body{
  width:28px;height:28px;position:relative;
}
.drone-body::before{
  content:'';position:absolute;top:50%;left:50%;
  width:20px;height:20px;transform:translate(-50%,-50%);
  background:var(--drone-blue);clip-path:polygon(50% 0%,100% 70%,80% 100%,20% 100%,0% 70%);
  filter:drop-shadow(0 0 8px var(--drone-blue));
}
.drone-body::after{
  content:'';position:absolute;top:50%;left:50%;
  width:36px;height:36px;transform:translate(-50%,-50%);
  border:1.5px solid rgba(0,229,255,.35);border-radius:50%;
  animation:drone-ring 2s ease infinite;
}
@keyframes drone-ring{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.3);opacity:0}}

/* ═══ DRAW PREVIEW ═══ */
.draw-hint{
  position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:90;
  padding:8px 20px;border-radius:var(--radius-lg);
  background:rgba(255,200,0,.12);border:1px solid rgba(255,200,0,.3);
  font:500 12px var(--sans);color:#ffe38a;
  pointer-events:none;
}

/* ═══ STATUS BAR ═══ */
.statusbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:44px;
  display:flex;align-items:center;gap:16px;padding:0 20px;
  background:var(--surface2);border-top:1px solid var(--border);
  backdrop-filter:blur(16px);
}
.status-item{font:400 12px var(--mono);color:var(--text2);display:flex;align-items:center;gap:6px}
.status-item .indicator{width:6px;height:6px;border-radius:50%}
.indicator.green{background:var(--radar-green);box-shadow:0 0 6px var(--radar-green)}
.indicator.red{background:var(--alert-red);box-shadow:0 0 6px var(--alert-red)}
.status-btn{
  padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);
  background:rgba(0,255,65,.06);color:var(--text2);font:500 11px var(--sans);
  cursor:pointer;transition:all .2s;
}
.status-btn:hover{background:rgba(0,255,65,.14);border-color:var(--border2);color:var(--radar-green)}
.status-btn.active{background:rgba(255,200,0,.12);border-color:rgba(255,200,0,.3);color:#ffe38a}
.status-btn.respawn{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--drone-blue)}
.status-btn.clear{background:rgba(255,68,68,.08);border-color:rgba(255,68,68,.2);color:#ff8a8a}
.status-spacer{flex:1}
.status-area{font:400 11px var(--mono);color:var(--text3)}

/* ═══ TEST VIEW ═══ */
.test-view{
  position:fixed;inset:52px 0 44px 0;
  background:var(--surface);overflow-y:auto;padding:32px;
  display:none;
}
.test-view.show{display:block}
.sim-view.hidden{display:none}
.test-title{font:700 20px var(--mono);color:var(--radar-green);margin-bottom:8px}
.test-subtitle{font:400 13px var(--sans);color:var(--text3);margin-bottom:28px}
.test-card{
  padding:16px 20px;margin-bottom:8px;border-radius:var(--radius);
  border:1px solid var(--border);background:rgba(0,255,65,.03);
  display:flex;align-items:center;gap:16px;transition:all .2s;
}
.test-card:hover{background:rgba(0,255,65,.06);border-color:var(--border2)}
.test-badge{
  width:64px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font:700 11px var(--mono);letter-spacing:.04em;flex-shrink:0;
}
.test-badge.pass{background:rgba(0,255,65,.14);color:var(--radar-green);border:1px solid rgba(0,255,65,.3)}
.test-badge.fail{background:rgba(255,68,68,.14);color:var(--alert-red);border:1px solid rgba(255,68,68,.3)}
.test-name{font:500 14px var(--sans);color:var(--text);flex:1}
.test-detail{font:400 12px var(--mono);color:var(--text3)}
.test-type-badge{
  padding:3px 10px;border-radius:4px;font:600 10px var(--mono);letter-spacing:.06em;
  background:rgba(0,229,255,.1);color:var(--drone-blue);border:1px solid rgba(0,229,255,.2);
}

/* ═══ INTERCEPTED FLASH ═══ */
.intercept-msg{
  position:absolute;z-index:30;
  font:700 14px var(--mono);color:var(--alert-red);
  text-shadow:0 0 12px var(--alert-red);
  pointer-events:none;transform:translate(-50%,-50%);
  animation:intercept-fade 1.5s ease forwards;
}
@keyframes intercept-fade{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-80%) scale(1.3)}}

/* ═══ CONTROLS HELP ═══ */
.controls-help{
  position:fixed;bottom:54px;right:16px;z-index:50;
  padding:10px 16px;border-radius:var(--radius);
  background:var(--surface2);border:1px solid var(--border);
  backdrop-filter:blur(12px);font:400 11px var(--mono);color:var(--text3);
  line-height:1.7;
}
.controls-help .key{
  display:inline-block;padding:1px 6px;border:1px solid var(--border2);
  border-radius:3px;background:rgba(255,255,255,.05);color:var(--text2);
  font-size:10px;min-width:20px;text-align:center;
}
</style>
</head>
<body>
<div id="root"></div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
// SECTION 1: VIRTUAL DOM CORE  (Week 3 재사용)
// ══════════════════════════════════════════════════════════

function createVNode(type, props, children) {
  return { type: type, props: props || {}, children: children || [] };
}
function createTextVNode(value) {
  return { type: 'TEXT_NODE', props: {}, children: [], value: String(value) };
}

var SVG_TAGS = ['svg','polygon','polyline','circle','rect','line','path','g','text','defs','clipPath','use','ellipse'];
var SVG_NS = 'http://www.w3.org/2000/svg';

function renderVNode(vnode) {
  if (!vnode) return document.createTextNode('');
  if (vnode.type === 'TEXT_NODE') return document.createTextNode(vnode.value);
  var el;
  if (SVG_TAGS.indexOf(vnode.type) >= 0) {
    el = document.createElementNS(SVG_NS, vnode.type);
  } else {
    el = document.createElement(vnode.type);
  }
  var keys = Object.keys(vnode.props);
  for (var i = 0; i < keys.length; i++) {
    el.setAttribute(keys[i], vnode.props[keys[i]]);
  }
  for (var j = 0; j < vnode.children.length; j++) {
    var child = renderVNode(vnode.children[j]);
    if (child) el.appendChild(child);
  }
  return el;
}

function cloneVNode(vnode) {
  if (!vnode) return null;
  if (vnode.type === 'TEXT_NODE') return createTextVNode(vnode.value);
  return createVNode(
    vnode.type,
    JSON.parse(JSON.stringify(vnode.props)),
    vnode.children.map(cloneVNode).filter(Boolean)
  );
}

// ══════════════════════════════════════════════════════════
// SECTION 2: DIFF ALGORITHM  (Week 3 재사용)
// ══════════════════════════════════════════════════════════

var CREATE = 'CREATE', REMOVE = 'REMOVE', REPLACE = 'REPLACE', UPDATE = 'UPDATE';

function diff(oldV, newV) {
  if (!oldV && newV) return { type: CREATE, newVNode: newV };
  if (oldV && !newV) return { type: REMOVE };
  if (!oldV && !newV) return null;
  if (oldV.type !== newV.type) return { type: REPLACE, newVNode: newV };
  if (oldV.type === 'TEXT_NODE') {
    return oldV.value !== newV.value ? { type: REPLACE, newVNode: newV } : null;
  }
  var propPatches = diffProps(oldV.props, newV.props);
  var childPatches = diffChildren(oldV.children, newV.children);
  if (!propPatches.length && !childPatches.length) return null;
  return { type: UPDATE, propPatches: propPatches, childPatches: childPatches };
}

function diffProps(oldP, newP) {
  var patches = [];
  var newKeys = Object.keys(newP);
  for (var i = 0; i < newKeys.length; i++) {
    if (oldP[newKeys[i]] !== newP[newKeys[i]]) patches.push({ action: 'SET', key: newKeys[i], value: newP[newKeys[i]] });
  }
  var oldKeys = Object.keys(oldP);
  for (var j = 0; j < oldKeys.length; j++) {
    if (!(oldKeys[j] in newP)) patches.push({ action: 'REMOVE', key: oldKeys[j] });
  }
  return patches;
}

function diffChildren(oldC, newC) {
  var patches = [];
  var max = Math.max(oldC.length, newC.length);
  for (var i = 0; i < max; i++) {
    var p = diff(i < oldC.length ? oldC[i] : null, i < newC.length ? newC[i] : null);
    if (p) patches.push({ index: i, patch: p });
  }
  return patches;
}

// ══════════════════════════════════════════════════════════
// SECTION 3: PATCH SYSTEM  (Week 3 재사용)
// ══════════════════════════════════════════════════════════

function realChildren(parent) {
  var result = [];
  for (var i = 0; i < parent.childNodes.length; i++) {
    var c = parent.childNodes[i];
    if (c.nodeType === Node.TEXT_NODE && c.textContent.trim() === '') continue;
    result.push(c);
  }
  return result;
}

function applyPatch(parent, node, patch) {
  if (!patch) return;
  switch (patch.type) {
    case CREATE:
      parent.appendChild(renderVNode(patch.newVNode));
      break;
    case REMOVE:
      if (node && node.parentNode) node.parentNode.removeChild(node);
      break;
    case REPLACE:
      var newEl = renderVNode(patch.newVNode);
      if (node && node.parentNode) node.parentNode.replaceChild(newEl, node);
      else parent.appendChild(newEl);
      break;
    case UPDATE:
      if (patch.propPatches) {
        for (var i = 0; i < patch.propPatches.length; i++) {
          var pp = patch.propPatches[i];
          if (pp.action === 'SET') {
            node.setAttribute(pp.key, pp.value);
            if (pp.key === 'style') node.style.cssText = pp.value;
            if (pp.key === 'class') node.className = pp.value;
          } else {
            node.removeAttribute(pp.key);
          }
        }
      }
      if (patch.childPatches && patch.childPatches.length > 0) {
        applyChildPatches(node, patch.childPatches);
      }
      break;
  }
}

function applyChildPatches(parent, childPatches) {
  // REMOVE (역순)
  var sorted = childPatches.slice().sort(function(a, b) { return b.index - a.index; });
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].patch.type === REMOVE) {
      var kids = realChildren(parent);
      if (kids[sorted[i].index]) parent.removeChild(kids[sorted[i].index]);
    }
  }
  // CREATE, REPLACE, UPDATE (정순)
  var others = childPatches.filter(function(cp) { return cp.patch.type !== REMOVE; });
  others.sort(function(a, b) { return a.index - b.index; });
  for (var j = 0; j < others.length; j++) {
    var cp = others[j];
    var children = realChildren(parent);
    if (cp.patch.type === CREATE) {
      var newNode = renderVNode(cp.patch.newVNode);
      if (cp.index >= children.length) parent.appendChild(newNode);
      else parent.insertBefore(newNode, children[cp.index]);
    } else {
      if (children[cp.index]) applyPatch(parent, children[cp.index], cp.patch);
    }
  }
}

// ══════════════════════════════════════════════════════════
// SECTION 4: MINI REACT FRAMEWORK  (Week 4 신규)
//   - FunctionComponent 클래스
//   - hooks 배열, mount(), update()
// ══════════════════════════════════════════════════════════

var currentComponent = null; // 현재 렌더 중인 컴포넌트 참조

class FunctionComponent {
  constructor(fn, props) {
    this.fn = fn;
    this.props = props || {};
    this.hooks = [];
    this.hookIndex = 0;
    this.vdom = null;
    this.container = null;
    this.rootEl = null;
    this.isMounted = false;
    this._updateScheduled = false;
    this._patchLog = []; // Diff/Patch 로그
  }

  /**
   * mount(): 첫 렌더링
   * 1. currentComponent 설정 → hookIndex 리셋
   * 2. fn(props) 호출 → VNode 트리 반환
   * 3. renderVNode → 실제 DOM 생성
   * 4. container에 삽입
   * 5. Effects 실행
   */
  mount(container) {
    this.container = container;
    currentComponent = this;
    this.hookIndex = 0;
    this.vdom = this.fn(this.props);
    this.rootEl = renderVNode(this.vdom);
    container.appendChild(this.rootEl);
    this.isMounted = true;
    this._runEffects();
    currentComponent = null;
  }

  /**
   * update(): 상태 변경 후 리렌더
   * 1. 새 VNode 트리 생성
   * 2. 이전 VNode과 diff
   * 3. 변경분만 patch
   * 4. Effects 실행
   * — requestAnimationFrame으로 Batching 처리
   */
  update() {
    if (this._updateScheduled) return;
    this._updateScheduled = true;
    var self = this;
    requestAnimationFrame(function() {
      self._updateScheduled = false;
      currentComponent = self;
      self.hookIndex = 0;

      var newVdom = self.fn(self.props);
      var patch = diff(self.vdom, newVdom);

      if (patch) {
        self._patchLog.push({ timestamp: Date.now(), patch: patch });
        if (self._patchLog.length > 100) self._patchLog.shift();
        applyPatch(self.container, self.rootEl, patch);
        // REPLACE인 경우 rootEl 참조 갱신
        if (patch.type === REPLACE) {
          self.rootEl = realChildren(self.container)[0];
        }
      }

      self.vdom = newVdom;
      self._runEffects();
      currentComponent = null;
    });
  }

  /** Effects 실행 — 렌더 후 cleanup → callback 순서 */
  _runEffects() {
    for (var i = 0; i < this.hooks.length; i++) {
      var hook = this.hooks[i];
      if (hook._type === 'effect' && hook._needsRun) {
        if (typeof hook._cleanup === 'function') hook._cleanup();
        hook._cleanup = hook._callback() || null;
        hook._needsRun = false;
      }
    }
  }
}

// ══════════════════════════════════════════════════════════
// SECTION 5: HOOKS  (Week 4 신규)
//   - useState, useEffect, useMemo
//   "함수는 매번 새로 실행되는데, 상태는 어떻게 유지할까?"
//   → hooks 배열에 인덱스 기반으로 저장
// ══════════════════════════════════════════════════════════

/**
 * useState(initialValue)
 * — hooks 배열의 현재 인덱스에 상태값 저장
 * — setState 호출 시 값 업데이트 + comp.update() 트리거
 * — 함수형 업데이트 지원: setState(prev => newVal)
 */
function useState(initialValue) {
  var comp = currentComponent;
  var idx = comp.hookIndex++;

  if (idx >= comp.hooks.length) {
    comp.hooks.push({ _type: 'state', _value: initialValue });
  }

  var hook = comp.hooks[idx];

  var setState = function(newValOrFn) {
    var newVal = typeof newValOrFn === 'function' ? newValOrFn(hook._value) : newValOrFn;
    if (newVal === hook._value) return; // 동일 참조면 업데이트 안 함
    hook._value = newVal;
    comp.update();
  };

  return [hook._value, setState];
}

/**
 * useEffect(callback, deps)
 * — deps 변경 시에만 callback 실행
 * — deps 생략: 매 렌더마다 실행
 * — deps=[]: mount 시 한 번만 실행
 * — cleanup 함수 반환 지원
 */
function useEffect(callback, deps) {
  var comp = currentComponent;
  var idx = comp.hookIndex++;
  var hasDeps = arguments.length >= 2;

  if (idx >= comp.hooks.length) {
    // 첫 렌더 — 항상 실행 예약
    comp.hooks.push({
      _type: 'effect',
      _callback: callback,
      _deps: hasDeps ? (deps ? deps.slice() : []) : undefined,
      _cleanup: null,
      _needsRun: true
    });
  } else {
    var hook = comp.hooks[idx];
    hook._callback = callback;

    if (!hasDeps) {
      // deps 없음 → 매번 실행
      hook._needsRun = true;
    } else {
      var newDeps = deps ? deps.slice() : [];
      if (!_depsEqual(hook._deps, newDeps)) {
        hook._needsRun = true;
        hook._deps = newDeps;
      }
    }
  }
}

/**
 * useMemo(factory, deps)
 * — deps 변경 시에만 factory 재실행, 결과 캐싱
 * — 비용이 큰 계산을 최적화
 */
function useMemo(factory, deps) {
  var comp = currentComponent;
  var idx = comp.hookIndex++;

  if (idx >= comp.hooks.length) {
    comp.hooks.push({
      _type: 'memo',
      _value: factory(),
      _deps: deps ? deps.slice() : null
    });
  } else {
    var hook = comp.hooks[idx];
    if (!_depsEqual(hook._deps, deps)) {
      hook._value = factory();
      hook._deps = deps ? deps.slice() : null;
    }
  }

  return comp.hooks[idx]._value;
}

/** deps 얕은 비교 */
function _depsEqual(a, b) {
  if (!a || !b) return false;
  if (a.length !== b.length) return false;
  for (var i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

// ══════════════════════════════════════════════════════════
// SECTION 6: UTILITY FUNCTIONS
// ══════════════════════════════════════════════════════════

/** Ray-casting 알고리즘 — 점이 폴리곤 내부에 있는지 판별 */
function pointInPolygon(px, py, polygon) {
  var inside = false;
  for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    var xi = polygon[i].x, yi = polygon[i].y;
    var xj = polygon[j].x, yj = polygon[j].y;
    var intersect = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/** 폴리곤 면적 (Shoelace formula) — 단위: px² */
function polygonArea(points) {
  var area = 0;
  for (var i = 0, j = points.length - 1; i < points.length; j = i++) {
    area += (points[j].x + points[i].x) * (points[j].y - points[i].y);
  }
  return Math.abs(area / 2);
}

/** 위성 이미지 URL 생성 — ESRI ArcGIS World Imagery */
function buildSatUrl(w, h) {
  // 이스라엘 네게브 사막 / 아이언돔 배치 지역 인근
  var bbox = '34.50,31.20,34.72,31.38';
  return 'https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export'
    + '?bbox=' + bbox + '&bboxSR=4326&size=' + w + ',' + h
    + '&imageSR=4326&format=jpg&f=image';
}

// ══════════════════════════════════════════════════════════
// SECTION 7: CHILD COMPONENTS (Stateless — props만 사용)
//   "자식 컴포넌트는 state 없이 props만 받아서 사용하는 순수 함수"
// ══════════════════════════════════════════════════════════

/** TopBar — 상단 네비게이션 */
function TopBar(props) {
  return createVNode('div', { class: 'topbar' }, [
    createVNode('div', { class: 'topbar-logo' }, [
      createVNode('span', { class: 'dot' }, []),
      createTextVNode('GEO-CAMO DEFENSE')
    ]),
    createVNode('span', { class: 'topbar-loc' }, [
      createTextVNode('Israel · Negev Desert · Iron Dome Sector')
    ]),
    createVNode('div', { class: 'topbar-tabs' }, [
      createVNode('button', {
        class: 'tab-btn' + (props.activeView === 'sim' ? ' active' : ''),
        'data-action': 'view-sim'
      }, [createTextVNode('Simulation')]),
      createVNode('button', {
        class: 'tab-btn' + (props.activeView === 'test' ? ' active' : ''),
        'data-action': 'view-test'
      }, [createTextVNode('VDom Tests')])
    ])
  ]);
}

/** SimView — 시뮬레이션 (위성사진 + 레이더 + 드론) */
function SimView(props) {
  var satStyle = 'background-image:url(' + buildSatUrl(window.innerWidth, window.innerHeight) + ')';
  var zoneEls = props.radarZones.map(function(zone) {
    var pts = zone.points.map(function(p) { return p.x + ',' + p.y; }).join(' ');
    return createVNode('g', {}, [
      // 반투명 채움
      createVNode('polygon', {
        points: pts,
        fill: 'rgba(0,255,65,0.10)',
        stroke: 'rgba(0,255,65,0.5)',
        'stroke-width': '2',
        'stroke-dasharray': '10,5',
        class: 'radar-zone'
      }, []),
      // 중심 레이블
      createVNode('text', {
        x: String(zone.center.x),
        y: String(zone.center.y),
        fill: 'rgba(0,255,65,0.6)',
        'font-size': '10',
        'font-family': 'Roboto Mono, monospace',
        'text-anchor': 'middle',
        'dominant-baseline': 'middle'
      }, [createTextVNode('RADAR ' + zone.id)])
    ]);
  });

  // 그리기 미리보기
  var drawEl = [];
  if (props.drawPoints.length > 1) {
    var dpts = props.drawPoints.map(function(p) { return p.x + ',' + p.y; }).join(' ');
    drawEl.push(createVNode('polyline', {
      points: dpts,
      fill: 'none',
      stroke: 'rgba(255,200,0,0.7)',
      'stroke-width': '2',
      'stroke-dasharray': '6,4'
    }, []));
  }

  var svgChildren = zoneEls.concat(drawEl);

  // 드론
  var droneStyle = 'left:' + props.dronePos.x + 'px;top:' + props.dronePos.y + 'px;'
    + 'transform:translate(-50%,-50%) rotate(' + props.droneAngle + 'deg)';

  // 요격 메시지
  var interceptEl = [];
  if (props.interceptPos) {
    interceptEl.push(createVNode('div', {
      class: 'intercept-msg',
      style: 'left:' + props.interceptPos.x + 'px;top:' + props.interceptPos.y + 'px'
    }, [createTextVNode('INTERCEPTED')]));
  }

  return createVNode('div', {
    class: 'sim-view' + (props.isDrawing ? ' drawing-mode' : ''),
    style: satStyle,
    'data-sim': 'true'
  }, [
    createVNode('svg', { class: 'radar-svg', xmlns: SVG_NS }, svgChildren),
    createVNode('div', {
      class: 'drone' + (props.droneAlive ? '' : ' dead'),
      style: droneStyle
    }, [
      createVNode('div', { class: 'drone-body' }, [])
    ])
  ].concat(interceptEl));
}

/** StatusBar — 하단 상태바 */
function StatusBar(props) {
  var items = [
    createVNode('span', { class: 'status-item' }, [
      createVNode('span', { class: 'indicator ' + (props.droneAlive ? 'green' : 'red') }, []),
      createTextVNode('Drone: ' + (props.droneAlive ? 'ACTIVE' : 'DESTROYED'))
    ]),
    createVNode('span', { class: 'status-item' }, [
      createTextVNode('Radar Zones: ' + props.zoneCount)
    ])
  ];

  if (props.activeView === 'sim') {
    items.push(createVNode('button', {
      class: 'status-btn' + (props.isDrawing ? ' active' : ''),
      'data-action': 'toggle-draw'
    }, [createTextVNode(props.isDrawing ? '✓ Drawing...' : '📡 Draw Radar')]));

    if (!props.droneAlive) {
      items.push(createVNode('button', {
        class: 'status-btn respawn',
        'data-action': 'respawn'
      }, [createTextVNode('↻ Respawn')]));
    }

    if (props.zoneCount > 0) {
      items.push(createVNode('button', {
        class: 'status-btn clear',
        'data-action': 'clear-zones'
      }, [createTextVNode('✕ Clear All')]));
    }
  }

  items.push(createVNode('span', { class: 'status-spacer' }, []));

  if (props.totalArea > 0) {
    items.push(createVNode('span', { class: 'status-area' }, [
      createTextVNode('Coverage: ' + Math.round(props.totalArea).toLocaleString() + ' px²')
    ]));
  }

  return createVNode('div', { class: 'statusbar' }, items);
}

/** ControlsHelp — 조작 도움말 */
function ControlsHelp(props) {
  if (props.activeView !== 'sim') return createVNode('div', { style: 'display:none' }, []);
  return createVNode('div', { class: 'controls-help' }, [
    createVNode('div', {}, [
      createVNode('span', { class: 'key' }, [createTextVNode('↑')]),
      createVNode('span', { class: 'key' }, [createTextVNode('↓')]),
      createVNode('span', { class: 'key' }, [createTextVNode('←')]),
      createVNode('span', { class: 'key' }, [createTextVNode('→')]),
      createTextVNode(' Move Drone')
    ])
  ]);
}

/** DrawHint — 그리기 모드 힌트 */
function DrawHint(props) {
  if (!props.isDrawing || props.activeView !== 'sim') return createVNode('div', { style: 'display:none' }, []);
  return createVNode('div', { class: 'draw-hint' }, [
    createTextVNode('Click & drag to draw radar zone — release to confirm')
  ]);
}

/** TestView — VDom 테스트 결과 패널 */
function TestView(props) {
  var cards = props.results.map(function(r) {
    return createVNode('div', { class: 'test-card' }, [
      createVNode('div', { class: 'test-badge ' + (r.pass ? 'pass' : 'fail') }, [
        createTextVNode(r.pass ? 'PASS' : 'FAIL')
      ]),
      createVNode('span', { class: 'test-name' }, [createTextVNode(r.name)]),
      createVNode('span', { class: 'test-type-badge' }, [createTextVNode(r.expected)]),
      createVNode('span', { class: 'test-detail' }, [createTextVNode(r.detail)])
    ]);
  });

  var passCount = props.results.filter(function(r) { return r.pass; }).length;

  return createVNode('div', { class: 'test-view' + (props.visible ? ' show' : '') }, [
    createVNode('div', { class: 'test-title' }, [
      createTextVNode('Virtual DOM Test Suite')
    ]),
    createVNode('div', { class: 'test-subtitle' }, [
      createTextVNode(passCount + ' / ' + props.results.length + ' tests passed — Diff 5 cases + No-op + Undo/Redo')
    ])
  ].concat(cards));
}

// ══════════════════════════════════════════════════════════
// SECTION 8: VDOM TEST SUITE
// ══════════════════════════════════════════════════════════

function runVDomTests() {
  var results = [];

  // 1. No-op Patch — 변경 없으면 patch null
  var o1 = createVNode('div', { class: 'status' }, [createTextVNode('Drone: ACTIVE')]);
  var n1 = createVNode('div', { class: 'status' }, [createTextVNode('Drone: ACTIVE')]);
  var p1 = diff(o1, n1);
  results.push({ name: 'No-op Patch', expected: 'NULL', actual: p1, pass: p1 === null,
    detail: p1 === null ? 'No patch generated' : 'Unexpected patch' });

  // 2. Text Node Change
  var o2 = createVNode('span', {}, [createTextVNode('Drone: ACTIVE')]);
  var n2 = createVNode('span', {}, [createTextVNode('Drone: DESTROYED')]);
  var p2 = diff(o2, n2);
  results.push({ name: 'Text Node Change', expected: 'UPDATE', actual: p2,
    pass: p2 !== null && p2.type === UPDATE,
    detail: p2 ? 'childPatches: text REPLACE' : 'No patch' });

  // 3. Attribute Update (props 변경)
  var o3 = createVNode('div', { class: 'drone', style: 'left:100px;top:200px' }, []);
  var n3 = createVNode('div', { class: 'drone', style: 'left:300px;top:150px' }, []);
  var p3 = diff(o3, n3);
  results.push({ name: 'Attribute Update', expected: 'UPDATE', actual: p3,
    pass: p3 !== null && p3.type === UPDATE && p3.propPatches.length > 0,
    detail: p3 ? p3.propPatches.length + ' prop(s) changed' : 'No patch' });

  // 4. Node Create
  var o4c = [createVNode('div', { id: 'r1' }, [])];
  var n4c = [createVNode('div', { id: 'r1' }, []), createVNode('div', { id: 'r2' }, [])];
  var p4 = diffChildren(o4c, n4c);
  var p4last = p4.length > 0 ? p4[p4.length - 1].patch : null;
  results.push({ name: 'Node Create', expected: 'CREATE', actual: p4last,
    pass: p4last !== null && p4last.type === CREATE,
    detail: p4last ? 'New node at index ' + p4[p4.length - 1].index : 'No create' });

  // 5. Node Remove
  var o5c = [createVNode('div', { id: 'r1' }, []), createVNode('div', { id: 'r2' }, [])];
  var n5c = [createVNode('div', { id: 'r1' }, [])];
  var p5 = diffChildren(o5c, n5c);
  var p5last = p5.length > 0 ? p5[p5.length - 1].patch : null;
  results.push({ name: 'Node Remove', expected: 'REMOVE', actual: p5last,
    pass: p5last !== null && p5last.type === REMOVE,
    detail: p5last ? 'Removed index ' + p5[p5.length - 1].index : 'No remove' });

  // 6. Element Replace (태그 자체 변경)
  var o6 = createVNode('h3', {}, [createTextVNode('Status')]);
  var n6 = createVNode('h2', {}, [createTextVNode('Status')]);
  var p6 = diff(o6, n6);
  results.push({ name: 'Element Replace', expected: 'REPLACE', actual: p6,
    pass: p6 !== null && p6.type === REPLACE,
    detail: p6 ? 'h3 → h2' : 'No replace' });

  // 7. Undo / Redo — 실제 DOM에서 패치 적용 + 복원
  var testBox = document.createElement('div');
  var origV = createVNode('div', { class: 'test' }, [createTextVNode('Original')]);
  testBox.appendChild(renderVNode(origV));
  var origHTML = testBox.innerHTML;

  var modV = createVNode('div', { class: 'test modified' }, [createTextVNode('Modified')]);
  var pMod = diff(origV, modV);
  applyPatch(testBox, testBox.firstChild, pMod);
  var modHTML = testBox.innerHTML;

  // Undo
  var pUndo = diff(modV, origV);
  applyPatch(testBox, testBox.firstChild, pUndo);
  var undoOk = testBox.innerHTML === origHTML;

  // Redo
  var pRedo = diff(origV, modV);
  applyPatch(testBox, testBox.firstChild, pRedo);
  var redoOk = testBox.innerHTML === modHTML;

  results.push({ name: 'Undo / Redo', expected: 'PASS', actual: null,
    pass: undoOk && redoOk,
    detail: 'Undo=' + (undoOk ? 'OK' : 'FAIL') + ', Redo=' + (redoOk ? 'OK' : 'FAIL') });

  return results;
}

// ══════════════════════════════════════════════════════════
// SECTION 9: ROOT COMPONENT — App
//   모든 State는 여기서만 관리 (Lifting State Up)
//   자식 컴포넌트는 props만 전달받음
// ══════════════════════════════════════════════════════════

// 모듈 레벨 참조 (게임 루프에서 최신 상태 읽기용)
var _droneAlive = true;
var _isDrawing = false;
var _pressedKeys = {};
var _radarZones = [];
var _zoneIdCounter = 1;

function App() {
  // ─── State ───
  var _s1 = useState('sim');          var activeView = _s1[0], setActiveView = _s1[1];
  var _s2 = useState({ x: 0, y: 0 }); var dronePos = _s2[0], setDronePos = _s2[1];
  var _s3 = useState(true);            var droneAlive = _s3[0], setDroneAlive = _s3[1];
  var _s4 = useState(0);               var droneAngle = _s4[0], setDroneAngle = _s4[1];
  var _s5 = useState([]);              var radarZones = _s5[0], setRadarZones = _s5[1];
  var _s6 = useState(false);           var isDrawing = _s6[0], setIsDrawing = _s6[1];
  var _s7 = useState([]);              var drawPoints = _s7[0], setDrawPoints = _s7[1];
  var _s8 = useState(null);            var interceptPos = _s8[0], setInterceptPos = _s8[1];

  // 모듈 레벨 참조 동기화
  _droneAlive = droneAlive;
  _isDrawing = isDrawing;
  _radarZones = radarZones;

  // ─── useMemo: 테스트 결과 (한 번만 계산) ───
  var testResults = useMemo(function() {
    return runVDomTests();
  }, []);

  // ─── useMemo: 총 레이더 커버리지 면적 ───
  var totalArea = useMemo(function() {
    return radarZones.reduce(function(sum, z) {
      return sum + polygonArea(z.points);
    }, 0);
  }, [radarZones]);

  // ─── useEffect: 초기 드론 위치 설정 (mount 시 1회) ───
  useEffect(function() {
    setDronePos({ x: Math.round(window.innerWidth / 2), y: Math.round(window.innerHeight / 2) });
  }, []);

  // ─── useEffect: 키보드 + 게임 루프 ───
  useEffect(function() {
    function onKeyDown(e) {
      _pressedKeys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.key) >= 0) {
        e.preventDefault();
      }
    }
    function onKeyUp(e) {
      _pressedKeys[e.key] = false;
    }

    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    var speed = 4;
    var animId;

    function gameLoop() {
      animId = requestAnimationFrame(gameLoop);

      if (!_droneAlive || _isDrawing) return;

      var dx = 0, dy = 0;
      if (_pressedKeys['ArrowUp'])    dy -= speed;
      if (_pressedKeys['ArrowDown'])  dy += speed;
      if (_pressedKeys['ArrowLeft'])  dx -= speed;
      if (_pressedKeys['ArrowRight']) dx += speed;

      if (dx !== 0 || dy !== 0) {
        // 방향 각도 계산
        var angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
        setDroneAngle(angle);

        setDronePos(function(prev) {
          var nx = Math.max(20, Math.min(window.innerWidth - 20, prev.x + dx));
          var ny = Math.max(62, Math.min(window.innerHeight - 54, prev.y + dy));
          if (nx === prev.x && ny === prev.y) return prev;
          return { x: nx, y: ny };
        });
      }
    }
    animId = requestAnimationFrame(gameLoop);

    return function() {
      document.removeEventListener('keydown', onKeyDown);
      document.removeEventListener('keyup', onKeyUp);
      cancelAnimationFrame(animId);
    };
  }, []);

  // ─── useEffect: 충돌 감지 (드론이 레이더 영역 진입 시 사라짐) ───
  useEffect(function() {
    if (!droneAlive) return;
    if (radarZones.length === 0) return;

    for (var i = 0; i < radarZones.length; i++) {
      if (pointInPolygon(dronePos.x, dronePos.y, radarZones[i].points)) {
        // 요격!
        setDroneAlive(false);
        setInterceptPos({ x: dronePos.x, y: dronePos.y });
        // 요격 메시지 1.5초 후 제거
        setTimeout(function() { setInterceptPos(null); }, 1500);
        break;
      }
    }
  }, [dronePos, radarZones, droneAlive]);

  // ─── useEffect: 클릭 이벤트 위임 (data-action 기반) ───
  useEffect(function() {
    function handleClick(e) {
      var actionEl = e.target.closest('[data-action]');
      if (!actionEl) return;
      var action = actionEl.getAttribute('data-action');

      switch (action) {
        case 'view-sim':
          setActiveView('sim'); break;
        case 'view-test':
          setActiveView('test'); break;
        case 'toggle-draw':
          setIsDrawing(function(prev) { return !prev; });
          setDrawPoints([]);
          break;
        case 'respawn':
          setDroneAlive(true);
          setDronePos({ x: Math.round(window.innerWidth / 2), y: Math.round(window.innerHeight / 2) });
          setDroneAngle(0);
          break;
        case 'clear-zones':
          setRadarZones([]);
          break;
      }
    }

    document.addEventListener('click', handleClick);
    return function() { document.removeEventListener('click', handleClick); };
  }, []);

  // ─── useEffect: 레이더 영역 그리기 (마우스 lasso) ───
  useEffect(function() {
    if (!isDrawing) return;

    var drawing = false;
    var points = [];
    var mapRect = null;

    function getPos(e) {
      return { x: e.clientX, y: e.clientY };
    }

    function onDown(e) {
      var simEl = e.target.closest('[data-sim]');
      if (!simEl) return;
      drawing = true;
      points = [getPos(e)];
      setDrawPoints(points.slice());
    }

    function onMove(e) {
      if (!drawing) return;
      points.push(getPos(e));
      // 간격 유지 (너무 빽빽하면 간솎)
      if (points.length % 2 === 0) {
        setDrawPoints(points.slice());
      }
    }

    function onUp(e) {
      if (!drawing) return;
      drawing = false;

      if (points.length > 10) {
        // 폴리곤 닫기 & 저장
        var cx = 0, cy = 0;
        for (var i = 0; i < points.length; i++) { cx += points[i].x; cy += points[i].y; }
        cx = Math.round(cx / points.length);
        cy = Math.round(cy / points.length);

        var newZone = { id: _zoneIdCounter++, points: points.slice(), center: { x: cx, y: cy } };
        setRadarZones(function(prev) { return prev.concat([newZone]); });
      }

      setDrawPoints([]);
      setIsDrawing(false);
    }

    document.addEventListener('mousedown', onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);

    return function() {
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
  }, [isDrawing]);

  // ─── VNode 트리 조립 ───
  return createVNode('div', { class: 'app' }, [
    TopBar({ activeView: activeView }),
    SimView({
      dronePos: dronePos,
      droneAlive: droneAlive,
      droneAngle: droneAngle,
      radarZones: radarZones,
      isDrawing: isDrawing,
      drawPoints: drawPoints,
      interceptPos: interceptPos,
      visible: activeView === 'sim'
    }),
    TestView({ results: testResults, visible: activeView === 'test' }),
    StatusBar({
      droneAlive: droneAlive,
      zoneCount: radarZones.length,
      isDrawing: isDrawing,
      totalArea: totalArea,
      activeView: activeView
    }),
    DrawHint({ isDrawing: isDrawing, activeView: activeView }),
    ControlsHelp({ activeView: activeView })
  ]);
}

// ══════════════════════════════════════════════════════════
// SECTION 10: INITIALIZATION
// ══════════════════════════════════════════════════════════

var root = new FunctionComponent(App, {});
root.mount(document.getElementById('root'));

</script>
